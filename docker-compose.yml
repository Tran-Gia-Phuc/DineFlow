version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dineflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo@dineflow
      POSTGRES_DB: odoo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dineflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17.0
    container_name: dineflow_odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling (chat/realtime sau này)
    volumes:
      - ./addons:/mnt/extra-addons          # custom modules của mình
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - odoo_data:/var/lib/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo@dineflow
    networks:
      - dineflow_net

volumes:
  pgdata:
  odoo_data:

networks:
  dineflow_net:
    driver: bridge
