[options]

; ====================
; | Addons & Data    |
; ====================
addons_path = /mnt/extra-addons
server_wide_modules = base,web
data_dir = /etc/odoo

; ====================
; | Security         |
; ====================
admin_passwd = dineflow_master_2024

; ====================
; | Database         |
; ====================
db_host = db
db_port = 5432
db_user = odoo
db_password = Phuc0312
; db_name = False         ; False = cho phép tạo nhiều DB qua UI
db_maxconn = 64

; ====================
; | HTTP Server      |
; ====================
; http_port = 8069
; gevent_port = 8072

; ====================
; | Logging          |
; ====================
logfile = /etc/odoo/odoo-server.log
log_level = info
; log_level = debug       ; bật khi cần debug

; ====================
; | Developer Mode   |
; ====================
dev_mode = reload

; ====================
; | Performance      |
; | Tối ưu 16GB RAM  |
; ====================

; workers = 0  → single-process, dễ debug (DÙNG KHI DEV)
; workers = 4  → multiprocess, mạnh hơn (DÙNG KHI TEST/PROD)
workers = 0

max_cron_threads = 2

; Chỉ có tác dụng khi workers > 0
limit_memory_soft = 2147483648   ; 2.0 GB per worker
limit_memory_hard = 2684354560   ; 2.5 GB per worker

limit_time_cpu = 60
limit_time_real = 120
limit_time_real_cron = 0         ; 0 = không giới hạn cron
limit_request = 8192